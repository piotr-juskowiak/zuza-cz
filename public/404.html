<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Nie znaleziono strony | Zuzanna Maria Czupryńska</title>
    <meta name="description" content="Ta strona nie istnieje lub została przeniesiona. Wróć na stronę główną Zuzanny Marii Czupryńskiej.">
    <link rel="canonical" href="https://zuzanna-czuprynska.pl/404">
    <link rel="icon" href="/favicon.png" type="image/png">
    <style>
        :root {
            color-scheme: light;
            --bg: #f9f8f6;
            --text: #1a2e28;
            --muted: #5c6b66;
            --accent: #c5a065;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 32px;
            background: var(--bg);
            color: var(--text);
            font-family: "Plus Jakarta Sans", Arial, sans-serif;
        }

        main {
            width: min(680px, 100%);
        }

        img {
            width: min(260px, 70vw);
            height: auto;
            display: block;
            margin-bottom: 48px;
        }

        p:first-of-type {
            margin: 0 0 12px;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: Georgia, serif;
            font-size: clamp(2.5rem, 9vw, 5.5rem);
            line-height: 0.95;
            font-weight: 500;
        }

        p {
            max-width: 520px;
            margin: 24px 0 0;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            margin-top: 32px;
            color: var(--text);
            font-weight: 700;
            text-decoration-color: var(--accent);
            text-underline-offset: 6px;
        }
    </style>
</head>
<body>
    <main>
        <img src="/logotyp.webp" alt="Zuzanna Maria Czupryńska" width="900" height="195" decoding="async">
        <p>Błąd 404</p>
        <h1>Nie znaleziono strony</h1>
        <p>Adres mógł zostać zmieniony albo usunięty. Najpewniej właściwa ścieżka znajduje się w głównej nawigacji.</p>
        <a href="/">Wróć na stronę główną</a>
    </main>
</body>
</html>
